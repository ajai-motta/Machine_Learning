<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Prediction Form</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: auto;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
        }
        button {
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 Student Performance Form</h2>

    <form action="{{ url_for('predict_data') }}" method="POST">

        <label>School</label>
        <select name="school">
            <option value="GP">GP</option>
            <option value="MS">MS</option>
        </select>

        <label>Sex</label>
        <select name="sex">
            <option value="F">F</option>
            <option value="M">M</option>
        </select>

        <label>Age</label>
        <input type="number" name="age">

        <label>Address</label>
        <select name="address">
            <option value="U">Urban</option>
            <option value="R">Rural</option>
        </select>

        <label>Family Size</label>
        <select name="famsize">
            <option value="GT3">GT3</option>
            <option value="LE3">LE3</option>
        </select>

        <label>Parent Status</label>
        <select name="Pstatus">
            <option value="A">Apart</option>
            <option value="T">Together</option>
        </select>

        <label>Mother Education</label>
        <input type="number" name="Medu">

        <label>Father Education</label>
        <input type="number" name="Fedu">

        <label>Mother Job</label>
        <input type="text" name="Mjob">

        <label>Father Job</label>
        <input type="text" name="Fjob">

        <label>Reason</label>
        <input type="text" name="reason">

        <label>Guardian</label>
        <input type="text" name="guardian">

        <label>Travel Time</label>
        <input type="number" name="traveltime">

        <label>Study Time</label>
        <input type="number" name="studytime">

        <label>Failures</label>
        <input type="number" name="failures">

        <label>School Support</label>
        <select name="schoolsup">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Family Support</label>
        <select name="famsup">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Paid Classes</label>
        <select name="paid">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Activities</label>
        <select name="activities">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Nursery</label>
        <select name="nursery">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Higher Education</label>
        <select name="higher">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Internet</label>
        <select name="internet">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Romantic</label>
        <select name="romantic">
            <option value="yes">yes</option>
            <option value="no">no</option>
        </select>

        <label>Family Relationship</label>
        <input type="number" name="famrel">

        <label>Free Time</label>
        <input type="number" name="freetime">

        <label>Go Out</label>
        <input type="number" name="goout">

        <label>Daily Alcohol</label>
        <input type="number" name="Dalc">

        <label>Weekly Alcohol</label>
        <input type="number" name="Walc">

        <label>Health</label>
        <input type="number" name="health">

        <label>Absences</label>
        <input type="number" name="absences">

        <label>G1</label>
        <input type="number" name="G1">

        <label>G2</label>
        <input type="number" name="G2">

        <button type="submit">🚀 Predict</button>

    </form>
</div>
<h1>Prediction is{{ results }}</h1>
</body>
</html>
